# /etc/nginx/sites-available/bpsd9.conf
#
# TLS terminates at the AWS ALB; nginx serves plain HTTP on :80.
#
# passenger_ruby lives in each server { } block to override the http-level
# default set by /etc/nginx/conf.d/mod-http-passenger.conf (shipped by the
# libnginx-mod-http-passenger package). Setting it again at http level
# would be a duplicate-directive error.

server {
    listen 80;

    server_name ~^((assets|www)|production\.internal)\.bpsd9\.org$;

    root /var/www/bpsd9/current/public;

    passenger_enabled on;
    passenger_ruby /opt/rbenv/shims/ruby;
    rails_env production;
    client_max_body_size 20m;
}

server {
    listen 80;

    server_name ~^(assets\.)?staging\.(internal\.)?bpsd9\.org$;

    root /var/www/bpsd9/current/public;

    passenger_enabled on;
    passenger_ruby /opt/rbenv/shims/ruby;
    rails_env staging;
    client_max_body_size 20m;
}

server {
    listen 80 default_server;

    server_name _;

    location /health-check {
        access_log off;
        return 200;
        add_header Content-Type text/plain;
    }
}
